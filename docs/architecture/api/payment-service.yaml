openapi: 3.0.3
info:
  title: Payment Service API
  description: Paiement mock et remboursement
  version: 1.0.0

servers:
  - url: http://localhost:8080/api/payments

paths:
  /:
    post:
      summary: Initier un paiement (appel interne travel-service)
      tags: [Payments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePaymentRequest'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'

    get:
      summary: Lister tous les paiements (ADMIN)
      tags: [Payments]
      security:
        - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PaymentResponse'

  /{id}/refund:
    post:
      summary: Rembourser
      tags: [Payments]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    CreatePaymentRequest:
      type: object
      required: [bookingId, userId, amount]
      properties:
        bookingId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        amount:
          type: number
          minimum: 0

    PaymentResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        bookingId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        amount:
          type: number
        status:
          type: string
          enum: [COMPLETED, FAILED, REFUNDED]
        createdAt:
          type: string
          format: date-time
