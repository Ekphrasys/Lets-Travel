server {
    listen 4200 ssl;
    server_name localhost;

    ssl_certificate     /etc/nginx/ssl/localhost-cert.pem;
    ssl_certificate_key /etc/nginx/ssl/localhost-key.pem;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:https:; front-src 'self' data:; connect-src 'self' https://localhost:8080; frame-ancestors 'none';" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "geolocation=(), microphone(), camera=()" always;
    
    
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
