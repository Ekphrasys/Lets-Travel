<div class="page">
  <div class="header">
    <h1>Utilisateurs</h1>
    <a routerLink="/admin/users/new">+ Nouvel utilisateur</a>
  </div>
  <table>
    <caption>Liste des utilisateurs</caption>
    <thead>
      <tr>
        <th>Email</th>
        <th>Nom</th>
        <th>Rôle</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      @for (u of users(); track u.id) {
        <tr>
          <td>{{ u.email }}</td>
          <td>{{ u.firstName }} {{ u.lastName }}</td>
          <td><span class="role">{{ u.role }}</span></td>
          <td class="actions">
            <a [routerLink]="['/admin/users', u.id, 'edit']">Modifier</a>
            <button (click)="deleteUser(u.id)">Supprimer</button>
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
