spring:
  datasource:
    url: jdbc:h2:mem:travel;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        default_schema: travel
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.neo4j.Neo4jDataAutoConfiguration
      - org.springframework.boot.autoconfigure.data.neo4j.Neo4jRepositoriesAutoConfiguration

eureka:
  client:
    enabled: false

jwt:
  secret: travel-jwt-secret-key-minimum-32-characters-long

internal:
  api-key: test-internal-api-key
