spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/travel_db?currentSchema=travel
    username: ${POSTGRES_USER:travel}
    password: ${POSTGRES_PASSWORD:travel_secret}
  jpa:
    hibernate:
      ddl-auto: update
  neo4j:
    uri: bolt://neo4j:7687
    authentication:
      username: neo4j
      password: ${NEO4J_PASSWORD:neo4j_secret}
  elasticsearch:
    uris: http://elasticsearch:9200

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://discovery-service:8761/eureka/}

jwt:
  secret: ${JWT_SECRET:travel-jwt-secret-key-minimum-32-characters-long}

internal:
  api-key: ${INTERNAL_API_KEY:travel-internal-api-key-change-me}
