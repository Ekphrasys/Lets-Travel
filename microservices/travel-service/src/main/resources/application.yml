server:
  port: 8083

spring:
  application:
    name: travel-service
  datasource:
    url: jdbc:postgresql://localhost:5432/travel_db?currentSchema=travel
    username: travel
    password: travel_secret
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: travel
    open-in-view: false
  neo4j:
    uri: bolt://localhost:7687
    authentication:
      username: neo4j
      password: neo4j_secret

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

jwt:
  secret: ${JWT_SECRET:travel-jwt-secret-key-minimum-32-characters-long}

internal:
  api-key: ${INTERNAL_API_KEY:travel-internal-api-key-change-me}

management:
  endpoints:
    web:
      exposure:
        include: health,info
