jenkins:
  systemMessage: "Lets-Travel Management System — CI/CD Pipeline"
  numExecutors: 4

credentials:
  system:
    domainCredentials:
      - credentials:
          - string:
              scope: GLOBAL
              id: "sonar-token"
              secret: "${SONAR_TOKEN}"
              description: "SonarQube token for Lets-Travel"
          - usernamePassword:
              scope: GLOBAL
              id: "git-travel-repo"
              username: "${GIT_USERNAME}"
              password: "${GIT_TOKEN}"
              description: "Git repository credentials"
          - string:
              scope: GLOBAL
              id: "neo4j-password"
              secret: "${NEO4J_PASSWORD:-neo4j_secret}"
              description: "Neo4j password for tests"

tool:
  git:
    installations:
      - name: "Default"
        home: "git"
  jdk:
    installations:
      - name: "jdk-17"
        home: "/opt/java/openjdk"
  maven:
    installations:
      - name: "maven-3"
        home: "/opt/maven"
  nodejs:
    installations:
      - name: "node-22"
        home: "/opt/node"
  sonarRunnerInstallation:
    installations:
      - name: "sonar-scanner"
        home: "/opt/sonar-scanner"
  dockerTool:
    installations:
      - name: "docker"
        home: "/usr/bin/docker"

unclassified:
  sonarGlobalConfiguration:
    buildWrapperEnabled: true
    installations:
      - name: "sonar-server"
        serverUrl: "http://sonarqube:9000"
        credentialsId: "sonar-token"
        triggers:
          skipScmCause: false
          skipUpstreamCause: false

jobs:
  - script: >
      pipelineJob('lets-travel') {
        description('Lets-Travel Pipeline — build, tests, SonarQube, security scan, deploy')
        triggers {
          scm('H/5 * * * *')
        }
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url('${GIT_REMOTE}')
                  credentials('git-travel-repo')
                }
                branches('*/main')
                extensions {
                  cleanBeforeCheckout()
                  cloneOptions {
                    depth(1)
                    shallow(true)
                  }
                }
              }
            }
            scriptPath('Jenkinsfile')
          }
        }
      }
